<!DOCTYPE html>
<html lang="ko">
    <head>
        <!-- infomation -->
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, user-scalable=no">
        <title>이벤트</title>

        <!-- import stylesheet -->
        <link rel="stylesheet" href="css/styles.css" type="text/css">

        <!-- import library -->
        <script type="text/javascript" src="lib/jquery.min.js"></script>
        <script type="text/javascript" src="lib/howler.min.js"></script>
        <!-- <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.0.4/howler.min.js"></script> -->
    </head>
    <body>
        <div class="game-wrap">
            <!-- 히든 이미지 로딩 -->
            <div class="game-preload">
                <span class="game-button-play"></span>
                <span class="game-button-stop"></span>
                <span class="game-layer"></span>
                <span class="game-layer-success"></span>
                <span class="game-layer-fail"></span>
                <span class="game-button-success-close"></span>
                <span class="game-button-fail-close"></span>
                <span class="game-status-popcorn-muzi"></span>
                <span class="game-status-popcorn-neo"></span>
                <span class="game-status-popcorn-frodo"></span>
                <span class="game-status-popcorn-jayg"></span>
                <span class="game-status-popcorn-ryan"></span>
                <span class="game-status-popcorn-con"></span>
                <span class="game-status-popcorn-apeach"></span>
                <span class="game-status-popcorn-tube"></span>
                <span class="game-status-puzzle-muzi"></span>
                <span class="game-status-puzzle-neo"></span>
                <span class="game-status-puzzle-frodo"></span>
                <span class="game-status-puzzle-jayg"></span>
                <span class="game-status-puzzle-ryan"></span>
                <span class="game-status-puzzle-apeach"></span>
                <span class="game-status-puzzle-tube"></span>
                <span class="game-status-logo-emart"></span>
                <span class="game-status-logo-popcorn"></span>
                <span class="game-status-logo-puzzle"></span>
                <span class="game-status-popcorn-muzi on"></span>
                <span class="game-status-popcorn-neo on"></span>
                <span class="game-status-popcorn-frodo on"></span>
                <span class="game-status-popcorn-jayg on"></span>
                <span class="game-status-popcorn-ryan on"></span>
                <span class="game-status-popcorn-con on"></span>
                <span class="game-status-popcorn-apeach on"></span>
                <span class="game-status-popcorn-tube on"></span>
                <span class="game-status-puzzle-muzi on"></span>
                <span class="game-status-puzzle-neo on"></span>
                <span class="game-status-puzzle-frodo on"></span>
                <span class="game-status-puzzle-jayg on"></span>
                <span class="game-status-puzzle-ryan on"></span>
                <span class="game-status-puzzle-apeach on"></span>
                <span class="game-status-puzzle-tube on"></span>
                <span class="game-status-logo-emart on"></span>
                <span class="game-status-logo-popcorn on"></span>
                <span class="game-status-logo-puzzle on"></span>
            </div>
            <!-- 상단 -->
            <div class="game-title">
                <img src="assets/images/takephoto_img_title.jpg" alt="">
            </div>
            <!-- 게임 -->
            <div class="game-inner">
                <div class="game-list"></div>
                <div class="game-phone">
                    <div class="game-status"></div>
                    <div class="game-effect"></div>
                    <div class="game-focus"></div>
                    <div class="game-bubble-01"></div>
                    <div class="game-bubble-02"></div>
                    <button type="button" class="game-button-play">시작</button>
                    <button type="button" class="game-button-stop">찰칵</button>
                </div>
            </div>
            <!-- 하단 -->
            <div class="game-info">
                <img src="assets/images/takephoto_img_info.jpg" alt="">
                <button type="button" class="game-button-info"></button>
                <button type="button" class="game-button-main"></button>
            </div>
            <!-- 로고 -->
            <div class="game-load">
                <span class="game-load-logo"></span>
            </div>
            <!-- 레이어 -->
            <div class="game-layer">
                <!-- 선택 -->
                <div class="game-layer-select">
                    <button type="button" class="game-button-select"></button>
                </div>
                <!-- 성공 -->
                <div class="game-layer-success">
                    <button type="button" class="game-button-success-close"></button>
                </div>
                <!-- 실패 -->
                <div class="game-layer-fail">
                    <button type="button" class="game-button-fail-close"></button>
                </div>
                <!-- 클리어 -->
                <div class="game-layer-clear">
                    <button type="button" class="game-button-clear"></button>
                </div>
            </div>
        </div>

        <!-- mobile console -->
         <div class="game-console">
            <div class="game-console-button-wrap">
                <button class="game-console-button" data-type="console">CONSOLE</button>
                <button class="game-console-button" data-type="element">ELEMENT</button>
                <button class="game-console-button" data-type="hide">SHOW</button>
            </div>
            <dia class="game-console-output">
                <div class="game-console-message"></div>
                <div class="game-console-element"></div>
            </dia>
        </div> 

        <!-- import script -->
        <script type="text/javascript" src="js/script.js"></script>
    </body>
</html>
