<!DOCTYPE html>
<html lang="ko">
    <head>
        <!-- infomation -->
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, user-scalable=no">
        <title>이벤트</title>

        <!-- import stylesheet -->
        <link rel="stylesheet" href="css/styles.css" type="text/css">

        <!-- import library -->
        <script type="text/javascript" src="lib/jquery.min.js"></script>
        <script type="text/javascript" src="lib/howler.min.js"></script>
        <!-- <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.0.4/howler.min.js"></script> -->
    </head>
    <body>
        <div class="game-wrap">
            <!-- 상단 -->
            <div class="game-title">
                <img src="assets/images/takephoto_img_title.jpg" alt="">
            </div>
            <!-- 게임 -->
            <div class="game-inner">
                <div class="game-list"></div>
                <div class="game-phone">
                    <div class="game-status"></div>
                    <div class="game-effect"></div>
                    <div class="game-focus"></div>
                    <div class="game-bubble-01"></div>
                    <div class="game-bubble-02"></div>
                    <button type="button" class="game-button-play"></button>
                    <button type="button" class="game-button-stop"></button>
                </div>
            </div>
            <!-- 하단 -->
            <div class="game-info">
                <img src="assets/images/takephoto_img_info.jpg" alt="">
                <button type="button" class="game-button-info"></button>
                <button type="button" class="game-button-main"></button>
            </div>
            <!-- 로고 -->
            <div class="game-load">
                <span class="game-load-logo"></span>
            </div>
            <!-- 레이어 -->
            <div class="game-layer">
                <!-- 선택 -->
                <div class="game-select">
                    <button type="button" class="game-select-popcorn"></button>
                    <button type="button" class="game-select-puzzle"></button>
                    <div class="game-select-list-popcorn">
                        <button type="button" class="game-select-popcorn-muzi"></button>
                        <button type="button" class="game-select-popcorn-neo"></button>
                        <button type="button" class="game-select-popcorn-frodo"></button>
                        <button type="button" class="game-select-popcorn-jayg"></button>
                        <button type="button" class="game-select-popcorn-ryan"></button>
                        <button type="button" class="game-select-popcorn-con"></button>
                        <button type="button" class="game-select-popcorn-apeach"></button>
                        <button type="button" class="game-select-popcorn-tube"></button>
                    </div>
                    <div class="game-select-list-puzzle">
                        <button type="button" class="game-select-puzzle-muzi"></button>
                        <button type="button" class="game-select-puzzle-neo"></button>
                        <button type="button" class="game-select-puzzle-frodo"></button>
                        <button type="button" class="game-select-puzzle-jayg"></button>
                        <button type="button" class="game-select-puzzle-ryan"></button>
                        <button type="button" class="game-select-puzzle-apeach"></button>
                        <button type="button" class="game-select-puzzle-tube"></button>
                    </div>
                    <button type="button" class="game-button-select"></button>
                </div>
                <!-- 성공 -->
                <div class="game-success">
                    <button type="button" class="game-button-success-close"></button>
                </div>
                <!-- 실패 -->
                <div class="game-fail">
                    <button type="button" class="game-button-fail-close"></button>
                </div>
                <!-- 클리어 -->
                <div class="game-clear">
                    <button type="button" class="game-button-clear"></button>
                </div>
            </div>
        </div>

        <!-- mobile console -->
        <!-- <div class="game-console">
            <div class="game-console-button-wrap">
                <button class="game-console-button" data-type="console">CONSOLE</button>
                <button class="game-console-button" data-type="element">ELEMENT</button>
                <button class="game-console-button" data-type="hide">SHOW</button>
            </div>
            <dia class="game-console-output">
                <div class="game-console-message"></div>
                <div class="game-console-element"></div>
            </dia>
        </div> -->

        <!-- import script -->
        <script type="text/javascript" src="js/script.js"></script>
    </body>
</html>
