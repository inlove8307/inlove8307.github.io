<!DOCTYPE html>
<html lang="ko">
    <head>
        <!-- infomation -->
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, user-scalable=no">
        <title>이벤트</title>

        <!-- import stylesheet -->
        <link rel="stylesheet" href="css/styles.css" type="text/css">

        <!-- import library -->
        <script type="text/javascript" src="lib/jquery.min.js"></script>
        <script type="text/javascript" src="lib/howler.min.js"></script>
        <!-- <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.0.4/howler.min.js"></script> -->
    </head>
    <body>
        <div class="game-load">
            <img class="game-load-inner" src="assets/images/emartgames_ico_logo.gif" alt="">
        </div>
        <div class="game-wrap">
            <div class="game-title">
                <img src="assets/images/takephoto_img_title.jpg" alt="">
            </div>

            <div class="game-inner">
                <div class="game-list"></div>
                <div class="game-phone">
                    <div class="game-status"></div>
                    <div class="game-effect"></div>
                    <div class="game-focus"></div>
                    <div class="game-bubble-01"></div>
                    <div class="game-bubble-02"></div>
                    <button type="button" class="game-button-play" data-action="play">시작</button>
                    <button type="button" class="game-button-stop" data-action="stop">찰칵</button>
                </div>
            </div>

            <div class="game-info">
                <img src="assets/images/takephoto_img_info.jpg" alt="">
                <button type="button" class="game-button-info" data-action="info"></button>
                <button type="button" class="game-button-main" data-action="main"></button>
            </div>
        </div>

        <!-- mobile console -->
        <div class="game-console">
            <div class="game-console-button-wrap">
                <button class="game-console-button" data-type="console">CONSOLE</button>
                <button class="game-console-button" data-type="element">ELEMENT</button>
                <button class="game-console-button" data-type="hide">SHOW</button>
            </div>
            <dia class="game-console-output">
                <div class="game-console-message"></div>
                <div class="game-console-element"></div>
            </dia>
        </div>

        <!-- import script -->
        <script type="text/javascript" src="js/script.js"></script>
    </body>
</html>
