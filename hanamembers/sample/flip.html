<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/mediaquery.css">
  <link rel="stylesheet" href="../css/font.css">

  <script src="../lib/lodash.js"></script>
  <script src="../lib/jquery-3.4.1.min.js"></script>
  <script src="../lib/TweenMax.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="flip">
      <span class="flip-front">FRONT</span>
      <span class="flip-back">BACK</span>
    </div>
  </div>

  <style>
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .flip {
      position: relative;
      width: 40vw;
      height: 40vw;
      transform: rotateY(0deg);
      transform-style: preserve-3d;
    }
    .flip-front,
    .flip-back {
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border-radius: 100%;
      border: 0.78vw solid rgb(0, 0, 0);
      backface-visibility: hidden;
      font-size: 6.25vw;
    }
    .flip-front {
      transform: rotateY(0deg);
      background-color: rgb(68, 68, 68);
      color: rgb(255, 255, 255);
    }
    .flip-back {
      transform: rotateY(-180deg);
      background-color: rgb(239, 239, 239);
      color: rgb(68, 68, 68);
    }
  </style>

  <script>
    (function(){
      'use strict';

      var timeline = new TimelineMax({ repeat: -1, repeatDelay: 1 });

      timeline.to('.flip', 1, { transform: 'rotateY(180deg)', ease: Power2.easeIn });
      timeline.to('.flip', 1, { transform: 'rotateY(360deg)', ease: Power2.easeOut });
    }())
  </script>

</body>
</html>
