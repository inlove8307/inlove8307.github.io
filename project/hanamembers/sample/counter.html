<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>

  <link rel="stylesheet" href="/lib/normalize.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mediaquery.css">
  <link rel="stylesheet" href="/css/font.css">

  <script src="/lib/lodash.js"></script>
  <script src="/lib/jquery-3.4.1.min.js"></script>
  <script src="/lib/TweenMax.min.js"></script>
  <script src="/js/global.js?v=201908021413"></script>
</head>
<body>

  <section class="container">
    <p class="price">＄<span class="counter">0</span></p>
  </section>

  <style>
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    .price {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 0;
      width: 27.77vw;
      height: 27.77vw;
      border-radius: 100%;
      background-color: rgba(0, 0, 0, 1);
      font-family: 'Noto Sans KR';
      font-weight: 700;
      font-size: 3.12vw;
      color: rgba(255, 255, 255, 1);
    }
  </style>

  <script>
    (function(){
      'use strict';

      ROOT.console.log(['log', 'counter'].join(' | '));

      ROOT.console.log(['log', 'location.parameters', JSON.stringify(ROOT.location.parameters)].join(' | '));

      var counter = ROOT.counter(1999900, 0.05, function(number){
        $('.counter').text(ROOT.string.price(number));
        ROOT.console.log(['log', 'counter', 'price', ROOT.string.price(number)].join(' | '));
      });

      $('.counter').on('click', function(){
        counter.play();
        ROOT.console.log(['log', 'counter', 'click'].join(' | '));
      });

      ROOT.observer.set('counter', function(observer){
        ROOT.console.log(['log', 'observer', observer[1].target.textContent].join(' | '));
      });

      ROOT.observer.add('counter', $('.counter').get());

      ROOT.console.add();
    }());
  </script>
</body>
</html>
