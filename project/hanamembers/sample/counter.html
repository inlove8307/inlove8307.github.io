<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>

  <link rel="stylesheet" href="/lib/normalize.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mediaquery.css">
  <link rel="stylesheet" href="/css/font.css">

  <script src="/lib/lodash.js"></script>
  <script src="/lib/jquery-3.4.1.min.js"></script>
  <script src="/lib/TweenMax.min.js"></script>
  <script src="/js/global.js?v=201908021436"></script>
</head>
<body>

  <section class="container">
    <button class="counter">$ <span class="price">0</span></button>
  </section>

  <style>
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    .counter {
      margin: 0;
      padding: 0;
      width: 35vw;
      height: 35vw;
      border: 0;
      border-radius: 100%;
      background-color: rgba(0, 0, 0, 1);
      font-family: 'Noto Sans KR';
      font-weight: 700;
      font-size: 3.47vw;
      color: rgba(255, 255, 255, 1);
    }
  </style>

  <script>
    (function(){
      'use strict';

      ROOT.console.log(['log', 'counter'].join(' | '));

      ROOT.console.log(['log', 'location.parameters', ROOT.json.set(ROOT.location.parameters)].join(' | '));

      var counter = ROOT.counter(1999900, 0.07, function(number){
        var random = (Math.random * 0.5).toFixed(2);

        $('.price').text(ROOT.string.price(number));

        TweenMax.fromTo(this, random, { width: '35vw', height: '35vw' }, { width: '40vw', height: '40vw' });

        ROOT.console.log(['log', 'counter', 'price', ROOT.string.price(number)].join(' | '));
      });

      $('.counter').on('click', function(){
        counter.play();
        ROOT.console.log(['log', 'counter', 'click'].join(' | '));
      });

      /*
      ROOT.observer.set('counter', function(observer){
        var index = -1;

        while (++index < observer.length) {
          ROOT.console.log(['log', 'observer', index, observer[index].target.textContent].join(' | '));
        }
      });

      ROOT.observer.add('counter', $('.price').get());
      */

      ROOT.console.add();
    }());
  </script>
</body>
</html>
