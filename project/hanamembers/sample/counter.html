<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta http-equiv="Expires" content="-1">
  <meta http-equiv="Cache-Control" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>

  <link rel="stylesheet" href="/lib/normalize.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mediaquery.css">
  <link rel="stylesheet" href="/css/font.css">

  <script src="/lib/lodash.js"></script>
  <script src="/lib/jquery-3.4.1.min.js"></script>
  <script src="/lib/TweenMax.min.js"></script>
  <script src="/js/global.js?v=201908021923"></script>
</head>
<body>

  <section class="container">
    <button class="counter">$ <span class="price">0</span></button>
  </section>

  <style>
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    .counter {
      position: relative;
      margin: 0;
      padding: 0;
      width: 35vw;
      height: 35vw;
      border: 0;
      border-radius: 100%;
      background-color: rgba(0, 0, 0, 1);
      box-shadow: 0 0 2.77vw rgba(0, 0, 0, 1);
      font-family: 'Noto Sans KR';
      font-weight: 400;
      font-size: 3.47vw;
      letter-spacing: -0.13vw;
      color: rgba(255, 255, 255, 1);
    }
    .counter::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      box-sizing: border-box;
      margin: -45% 0 0 -45%;
      width: 90%;
      height: 90%;
      border: 0.27vw solid rgba(255, 255, 255, 0.5);
      border-radius: 100%;
      background-color: transparent;
    }
    .counter:focus {
      outline: none;
    }
  </style>

  <script>
    (function(){
      'use strict';

      ROOT.console.log(['log', 'counter'].join(' | '));

      ROOT.console.log(['log', 'location.parameters', ROOT.json.set(ROOT.location.parameters)].join(' | '));

      var price;

      var counter;

      $('.counter').on('click', function(){
        var t = this;

        $(t).prop('disabled', true);

        price = Math.floor(Math.random() * 1000000000);

        ROOT.counter(price, 0.1, function(number, duration, complete){
          var random = (Math.random() * (duration * 10)).toFixed(2);

          $('.price').text(ROOT.string.price(number));

          if (complete) {
            TweenMax.to($('.counter'), duration, { width: '35vw', height: '35vw' });
            $(t).prop('disabled', false);
          }
          else {
            TweenMax.fromTo($('.counter'), random, { width: '35vw', height: '35vw' }, { width: '40vw', height: '40vw' });
          }

          ROOT.console.log(['log', 'counter', 'price', ROOT.string.price(number)].join(' | '));
        }).play();

        ROOT.console.log(['log', 'counter', 'click'].join(' | '));
      });

      /*
      ROOT.observer.set('counter', function(observer){
        var index = -1;

        while (++index < observer.length) {
          ROOT.console.log(['log', 'observer', index, observer[index].target.textContent].join(' | '));
        }
      });

      ROOT.observer.add('counter', $('.price').get());
      */

      ROOT.console.add();
    }());
  </script>
</body>
</html>
