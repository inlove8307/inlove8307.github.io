<body>
	<h1>button</h1>

	<h2>Large</h2>

		</div>
		<hr>
		<div class="button">
			<button class="button-02" style="width:50%" disabled="disabled">버튼명</button>
			<button class="button-01" style="width:50%" disabled="disabled">버튼명</button>
		</div>
		<hr>
		<div class="button">
			<button class="button-02" style="width:50%">버튼명</button>
			<button class="button-01" style="width:50%">버튼명</button>
		</div>
	</div>
	<pre class="brush:css">
		<div class="button">
			<button class="button-01" style="width:100%" disabled="disabled">버튼명</button>
		</div>
		<div class="button">
			<button class="button-01" style="width:100%">버튼명</button>
		</div>
		<div class="button">
			<button class="button-02" style="width:50%" disabled="disabled">버튼명</button>
			<button class="button-01" style="width:50%" disabled="disabled">버튼명</button>
		</div>
		<div class="button">
			<button class="button-02" style="width:50%">버튼명</button>
			<button class="button-01" style="width:50%">버튼명</button>
		</div>
	</pre>

	<h2>medium</h2>
	<div class="view">
		<button class="button-03" style="width:29rem" disabled="disabled">버튼명</button>
		<hr>
		<button class="button-03" style="width:29rem">버튼명</button>
		<hr>
		<button class="button-04" style="width:15.5rem" disabled="disabled">버튼명</button>
		<hr>
		<button class="button-04" style="width:15.5rem">버튼명</button>
	</div>
	<pre class="brush:css">
		<button class="button-03" style="width:29rem" disabled="disabled">버튼명</button>
		<button class="button-03" style="width:29rem">버튼명</button>
		<button class="button-04" style="width:15.5rem" disabled="disabled">버튼명</button>
		<button class="button-04" style="width:15.5rem">버튼명</button>

	<h2>option</h2>
	<div class="view">
		<button class="button-05" style="width:18rem" disabled="disabled">버튼명</button>
		<hr>
		<button class="button-05" style="width:18rem">버튼명</button>
		<hr>
		<button class="button-06" style="width:10rem" disabled="disabled">버튼명</button>
		<hr>
		<button class="button-06" style="width:10rem">버튼명</button>
		<hr>
		<button class="button-07" style="width:7.5rem" disabled="disabled">버튼명</button>
		<hr>
		<button class="button-07" style="width:7.5rem">버튼명</button>
	</div>
	<pre class="brush:css">
		<button class="button-05" style="width:18rem" disabled="disabled">버튼명</button>
		<button class="button-05" style="width:18rem">버튼명</button>
		<button class="button-06" style="width:10rem" disabled="disabled">버튼명</button>
		<button class="button-06" style="width:10rem">버튼명</button>
		<button class="button-07" style="width:7.5rem" disabled="disabled">버튼명</button>
		<button class="button-07" style="width:7.5rem">버튼명</button>
	</pre>

	<h2>toggle</h2>
	<div class="view">
		<span class="toggle">
			<label for="TOGGLE_01"><span>미사용</span></label>
			<input type="checkbox" id="TOGGLE_01">
		</span>
	</div>
	<pre class="brush:css">
		<span class="toggle">
			<label for="TOGGLE_01"><span>미사용</span></label>
			<input type="checkbox" id="TOGGLE_01">
		</span>
	</pre>

	<script>
		$('.toggle input').on('change', function(event){
			var $label = $(this).siblings('label')
				, $span = $label.children();

			if ($(this).prop('checked')) {
				$span.animate({ left: $label.width() - $span.width() }, 200).text('사용');
				$label.animate({ backgroundColor: 'rgb(80, 122, 255)', borderColor: 'rgb(80, 122, 255)' }, 200);
			}
			else {
				$span.animate({ left: 0 }, 200).text('미사용');
				$label.animate({ backgroundColor: 'rgb(178, 178, 178)', borderColor: 'rgb(178, 178, 178)' }, 200);
			}
		});
	</script>
</body>
