<!DOCTYPE html>
<meta name="robots" content="noindex">
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Roulette</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
  <style>
  html, body{margin:0;padding:0;}
  .img-wrap{padding:5%;}
  .img-wrap img{width:100%;height:auto;}
  .btn-wrap{overflow:hidden;padding:5%;}
  .btn-wrap button{box-sizing:border-box;float:left;width:100%;}
  </style>
</head>
<body>
  <div class="img-wrap">
    <img src="http://stimg.emart.com/app/images/eventapp/1602/roul_luck_rotate.png" alt="">
  </div>
  <div class="btn-wrap">
    <button class="play">PLAY</button>
  </div>
  <script>
  (function(window, document, undefined){
    var target = document.querySelector('img');

    var codes = ['A00', 'A01', 'A02', 'A03', 'A04', 'A05', 'A06', 'A07']
    var keymap = createKeymap(codes);

    var timeout = timeline = code = null;

    function createKeymap(array){
      var result = {}, i, length;

      for (i = 0, length = array.length; i < length; i++) {
        result[array[i]] = 360 / length * i;
      }

      return result;
    }

    function doAjax(event){
      // ajax success
      code = getRandom(codes);
      timeline.fromTo(target, 1.5, { rotation: keymap[code] }, { rotation: 720 + keymap[code], ease: Power1.easeOut });
    }

    function getRandom(array){
      return 'A0' + Math.floor(Math.random() * array.length);
    }

    function actionRoulette(event){
      code = null;

      // action start
      timeline = new TimelineLite();
      timeline
      .fromTo(target, 1.5, { rotation: 0 }, { rotation: 1440, ease: Power0.easeNone })
      .eventCallback('onUpdate', function(){
        console.log(this.progress());
      })
      .call(function(){
        if (!code) timeline.restart();
      });

      timeout = setTimeout(doAjax, 1500);
    }

    document.querySelector('.play').addEventListener('click', actionRoulette);
  }(window, document))
</script>
</body>
</html>
