<!doctype html>

<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SoundJS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--<link rel="stylesheet" href="css/styles.css?v=1.0">-->
  <script src="https://code.createjs.com/soundjs-0.6.2.min.js"></script>
  <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.js"></script>
  <![endif]-->
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%}
    button{position:absolute;top:50%;left:50%;margin:-50px 0 0 -50%;width:100%;height:100%}
  </style>
</head>

<body onload="loadSound();">
  <button onclick="playSound();" class="playSound">Play Sound</button>
  <!--<script src="js/scripts.js?v=1.0"></script>-->
  <script>
    var soundID = "everyday_emart";

    function loadSound () {
      createjs.Sound.registerSound("assets/everyday_emart.mp3", soundID);
    }

    function playSound () {
      createjs.Sound.play(soundID);
    }
  </script>
</body>
</html>
